<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTG Deck Viewer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a0a;
    color: #e5e5e5;
    min-height: 100vh;
  }

  .container { max-width: 640px; margin: 0 auto; padding: 2rem 1rem; }

  h1 { font-size: 1.5rem; font-weight: 700; color: #fff; text-align: center; margin-bottom: 0.25rem; }
  .subtitle { text-align: center; font-size: 0.875rem; color: #6b7280; margin-bottom: 2rem; }

  /* Input */
  .input-section label { font-size: 0.875rem; font-weight: 500; color: #d1d5db; }
  .sample-btn { font-size: 0.75rem; color: #d97706; cursor: pointer; background: none; border: none; float: right; }
  .sample-btn:hover { color: #f59e0b; }

  textarea {
    width: 100%; height: 200px; margin-top: 0.5rem;
    background: #111; border: 1px solid #333; border-radius: 0.5rem;
    padding: 0.75rem; font-size: 0.875rem; color: #e5e5e5;
    font-family: 'SF Mono', 'Fira Code', monospace; resize: vertical;
  }
  textarea:focus { outline: none; border-color: rgba(217,119,6,0.5); box-shadow: 0 0 0 2px rgba(217,119,6,0.15); }
  textarea::placeholder { color: #4b5563; }

  .submit-btn {
    width: 100%; margin-top: 1rem; padding: 0.625rem;
    background: #b45309; color: #fff; font-size: 0.875rem; font-weight: 500;
    border: none; border-radius: 0.5rem; cursor: pointer;
  }
  .submit-btn:hover { background: #d97706; }
  .submit-btn:disabled { background: #374151; color: #6b7280; cursor: not-allowed; }

  /* Drop zone */
  .dropzone {
    border: 2px dashed #333; border-radius: 0.5rem; padding: 1.5rem;
    text-align: center; margin-top: 1rem; font-size: 0.875rem; color: #6b7280;
    transition: border-color 0.2s;
  }
  .dropzone.drag-over { border-color: #d97706; background: rgba(217,119,6,0.03); }
  .dropzone label { color: #d97706; cursor: pointer; }
  .dropzone input { display: none; }

  /* Results */
  .back-btn {
    font-size: 0.875rem; color: #9ca3af; cursor: pointer;
    background: none; border: none; margin-bottom: 1rem;
  }
  .back-btn:hover { color: #fff; }

  .share-btn {
    font-size: 0.75rem; background: #1f2937; color: #d1d5db;
    padding: 0.375rem 0.75rem; border: none; border-radius: 0.25rem; cursor: pointer;
    float: right;
  }
  .share-btn:hover { background: #374151; }

  /* Deck header */
  .deck-header { margin-bottom: 1rem; }
  .deck-name { font-size: 1.125rem; font-weight: 600; color: #fff; }
  .deck-meta { display: flex; align-items: center; gap: 0.5rem; font-size: 0.875rem; color: #9ca3af; margin-top: 0.25rem; }
  .color-dot {
    width: 1rem; height: 1rem; border-radius: 50%; border: 1px solid #4b5563; display: inline-block;
  }

  /* Card groups */
  .card-group { margin-bottom: 0.75rem; }
  .group-header {
    font-size: 0.75rem; font-weight: 500; color: #6b7280;
    text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.25rem;
  }

  .card-row {
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.25rem 0.5rem; border-radius: 0.25rem;
    cursor: default; position: relative;
  }
  .card-row:hover { background: rgba(255,255,255,0.04); }

  .card-qty { font-size: 0.875rem; color: #6b7280; width: 1.25rem; text-align: right; font-family: monospace; }

  .card-thumb {
    width: 2rem; height: 1.5rem; border-radius: 0.2rem; overflow: hidden;
    background: #1f2937; flex-shrink: 0;
  }
  .card-thumb img { width: 100%; height: 100%; object-fit: cover; object-position: 50% 25%; }

  .card-name { font-size: 0.875rem; color: #d1d5db; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card-row:hover .card-name { color: #fff; }

  .card-mana { font-size: 0.75rem; color: #6b7280; font-family: monospace; flex-shrink: 0; }

  /* Hover popup */
  .card-popup {
    position: fixed; z-index: 100; pointer-events: none;
    background: #111827; border: 1px solid #374151; border-radius: 0.5rem;
    box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7); overflow: hidden;
    opacity: 0; transition: opacity 0.15s;
  }
  .card-popup.visible { opacity: 1; }
  .card-popup img { width: 250px; display: block; border-radius: 0.5rem 0.5rem 0 0; }
  .card-popup-info { padding: 0.5rem; font-size: 0.75rem; }
  .card-popup-name { font-weight: 500; color: #fff; display: flex; justify-content: space-between; }
  .card-popup-price { color: #34d399; }
  .card-popup-type { color: #9ca3af; margin-top: 0.125rem; }
  .card-popup-text { color: #9ca3af; font-size: 0.6875rem; line-height: 1.3; margin-top: 0.25rem;
    display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }

  /* Mana curve */
  .curve-section { border-top: 1px solid #1f2937; padding-top: 0.75rem; margin-top: 1rem; }
  .curve-title { font-size: 0.75rem; font-weight: 500; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
  .curve-chart { display: flex; align-items: flex-end; gap: 0.25rem; height: 4rem; }
  .curve-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 0.125rem; }
  .curve-count { font-size: 0.625rem; color: #9ca3af; }
  .curve-bar { width: 100%; background: rgba(217,119,6,0.7); border-radius: 0.125rem; transition: height 0.3s; }
  .curve-label { font-size: 0.625rem; color: #6b7280; }

  /* Sideboard divider */
  .section-divider { border-top: 1px solid #1f2937; padding-top: 1rem; margin-top: 1.5rem; }

  /* Error */
  .error { margin-top: 1rem; padding: 0.75rem; background: rgba(127,29,29,0.2); border: 1px solid rgba(127,29,29,0.4); border-radius: 0.5rem; font-size: 0.875rem; color: #fca5a5; }

  /* Loading */
  .loading { text-align: center; padding: 2rem; color: #6b7280; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { display: inline-block; width: 1.5rem; height: 1.5rem; border: 2px solid #333; border-top-color: #d97706; border-radius: 50%; animation: spin 0.6s linear infinite; margin-bottom: 0.5rem; }
</style>
</head>
<body>

<div class="container">
  <h1>MTG Deck Viewer</h1>
  <p class="subtitle">Paste a decklist. Hover to inspect cards. Share anywhere.</p>

  <!-- Input section -->
  <div id="input-section" class="input-section">
    <label>
      Paste a decklist
      <button class="sample-btn" onclick="loadSample()">Load sample deck</button>
    </label>
    <textarea id="deck-input" placeholder="4 Lightning Bolt&#10;4 Monastery Swiftspear&#10;2 Eidolon of the Great Revel&#10;..."></textarea>

    <div id="dropzone" class="dropzone">
      Drop a decklist screenshot here, or
      <label>browse<input type="file" accept="image/*" onchange="handleFile(event)"></label>
    </div>

    <button id="submit-btn" class="submit-btn" onclick="handleSubmit()" disabled>View Deck</button>
  </div>

  <!-- Results section -->
  <div id="results-section" style="display:none;">
    <button class="back-btn" onclick="showInput()">← New deck</button>
    <button class="share-btn" onclick="copyShareLink()">Copy share link</button>
    <div id="deck-content"></div>
  </div>

  <!-- Loading -->
  <div id="loading-section" class="loading" style="display:none;">
    <div class="spinner"></div>
    <div>Loading cards from Scryfall...</div>
  </div>

  <!-- Error -->
  <div id="error-section" class="error" style="display:none;"></div>
</div>

<!-- Hover popup -->
<div id="card-popup" class="card-popup">
  <img id="popup-img" src="" alt="">
  <div class="card-popup-info">
    <div class="card-popup-name">
      <span id="popup-name"></span>
      <span id="popup-price" class="card-popup-price"></span>
    </div>
    <div id="popup-type" class="card-popup-type"></div>
    <div id="popup-text" class="card-popup-text"></div>
  </div>
</div>

<script>
// ─── State ───
let cardCache = {};

const SAMPLE_DECK = `4 Monastery Swiftspear
4 Soul-Scar Mage
4 Goblin Guide
4 Eidolon of the Great Revel
4 Lightning Bolt
4 Lava Spike
4 Rift Bolt
4 Searing Blaze
4 Skullcrack
2 Light Up the Stage
2 Shard Volley
4 Inspiring Vantage
4 Sacred Foundry
2 Sunbaked Canyon
2 Fiery Islet
8 Mountain

Sideboard
2 Path to Exile
2 Rest in Peace
3 Sanctifier en-Vec
2 Roiling Vortex
2 Smash to Smithereens
2 Deflecting Palm
2 Kor Firewalker`;

// ─── Parser ───
function parseDeckList(input) {
  const lines = input.split(/\r?\n/);
  const sectionHeaders = {
    deck: 'mainboard', mainboard: 'mainboard', maindeck: 'mainboard', main: 'mainboard',
    sideboard: 'sideboard', side: 'sideboard', sb: 'sideboard',
    companion: 'companion', commander: 'commander',
  };
  let section = 'mainboard';
  let deckName = null;
  const entries = [];
  let seenCards = false;

  for (const raw of lines) {
    const line = raw.trim();
    if (!line) {
      if (seenCards && section === 'mainboard') section = 'sideboard';
      continue;
    }
    const headerKey = line.toLowerCase().replace(/[:\s]/g, '');
    if (sectionHeaders[headerKey]) { section = sectionHeaders[headerKey]; continue; }

    let working = line;
    let lineSection = section;
    if (/^SB:\s*/i.test(working)) { working = working.replace(/^SB:\s*/i, ''); lineSection = 'sideboard'; }

    const match = working.match(/^(\d+)\s*[xX]?\s+(.+)$/);
    if (!match) {
      if (!seenCards && !deckName && !/^\d/.test(line)) deckName = line;
      continue;
    }

    let name = match[2].trim();
    // Strip Arena set info: "(SET) 123"
    name = name.replace(/\s*\([A-Z0-9]+\)\s+\d+[a-z]?$/, '').trim();

    entries.push({ quantity: parseInt(match[1]), name, section: lineSection });
    seenCards = true;
  }
  return { entries, name: deckName };
}

// ─── Scryfall ───
async function fetchCards(identifiers) {
  const uncached = identifiers.filter(id => !cardCache[id.name.toLowerCase()]);
  if (uncached.length > 0) {
    // Batch into groups of 75
    for (let i = 0; i < uncached.length; i += 75) {
      const batch = uncached.slice(i, i + 75);
      const body = { identifiers: batch.map(id => ({ name: id.name })) };
      const resp = await fetch('https://api.scryfall.com/cards/collection', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!resp.ok) throw new Error(`Scryfall error: ${resp.status}`);
      const data = await resp.json();
      for (const card of data.data) {
        cardCache[card.name.toLowerCase()] = card;
      }
      if (i + 75 < uncached.length) await new Promise(r => setTimeout(r, 100));
    }
  }
  return cardCache;
}

function getImageUri(card, size) {
  size = size || 'normal';
  if (card.image_uris) return card.image_uris[size];
  if (card.card_faces && card.card_faces[0] && card.card_faces[0].image_uris)
    return card.card_faces[0].image_uris[size];
  return '';
}

function formatMana(cost) {
  if (!cost) return '';
  return cost.replace(/\{([^}]+)\}/g, (_, s) => s);
}

// ─── Categorize ───
const CATEGORIES = ['Creature','Planeswalker','Instant','Sorcery','Enchantment','Artifact','Land','Other'];

function categorize(card) {
  const t = card.type_line.toLowerCase();
  if (t.includes('creature')) return 'Creature';
  if (t.includes('planeswalker')) return 'Planeswalker';
  if (t.includes('instant')) return 'Instant';
  if (t.includes('sorcery')) return 'Sorcery';
  if (t.includes('enchantment')) return 'Enchantment';
  if (t.includes('artifact')) return 'Artifact';
  if (t.includes('land')) return 'Land';
  return 'Other';
}

const COLOR_MAP = {
  W: { name: 'White', hex: '#F9FAF4' },
  U: { name: 'Blue', hex: '#0E68AB' },
  B: { name: 'Black', hex: '#150B00' },
  R: { name: 'Red', hex: '#D3202A' },
  G: { name: 'Green', hex: '#00733E' },
};

// ─── Render ───
function renderDeck(entries, cards, deckName) {
  const container = document.getElementById('deck-content');
  const main = entries.filter(e => e.section === 'mainboard');
  const side = entries.filter(e => e.section === 'sideboard');

  let html = '';

  // Render a section (mainboard or sideboard)
  function renderSection(sectionEntries, label) {
    const resolved = [];
    for (const entry of sectionEntries) {
      const card = cards[entry.name.toLowerCase()];
      if (card) resolved.push({ entry, card });
    }
    if (resolved.length === 0) return '';

    // Group by category
    const groups = {};
    for (const cat of CATEGORIES) groups[cat] = [];
    for (const { entry, card } of resolved) {
      groups[categorize(card)].push({ entry, card });
    }
    // Sort each group by CMC
    for (const cat of CATEGORIES) {
      groups[cat].sort((a, b) => a.card.cmc - b.card.cmc);
    }

    const totalCards = resolved.reduce((s, r) => s + r.entry.quantity, 0);
    const colors = new Set();
    for (const { card } of resolved) {
      for (const c of card.color_identity) colors.add(c);
    }

    let s = '<div class="deck-header">';
    if (deckName && label === 'Mainboard') s += `<div class="deck-name">${esc(deckName)}</div>`;
    s += '<div class="deck-meta">';
    s += `<span>${label}</span><span>·</span><span>${totalCards} cards</span>`;
    if (colors.size > 0) {
      s += '<span>·</span>';
      for (const c of colors) {
        const info = COLOR_MAP[c] || { hex: '#888', name: c };
        s += `<span class="color-dot" style="background:${info.hex}" title="${info.name}"></span>`;
      }
    }
    s += '</div></div>';

    for (const cat of CATEGORIES) {
      if (groups[cat].length === 0) continue;
      const count = groups[cat].reduce((s, r) => s + r.entry.quantity, 0);
      s += `<div class="card-group"><div class="group-header">${cat} (${count})</div>`;
      for (const { entry, card } of groups[cat]) {
        const thumb = getImageUri(card, 'small');
        const mana = formatMana(card.mana_cost || (card.card_faces && card.card_faces[0] ? card.card_faces[0].mana_cost : ''));
        s += `<div class="card-row" data-card="${esc(card.name.toLowerCase())}"
               onmouseenter="showPopup(event, '${esc(card.name.toLowerCase())}')"
               onmouseleave="hidePopup()">`;
        s += `<span class="card-qty">${entry.quantity}</span>`;
        s += `<div class="card-thumb">${thumb ? `<img src="${thumb}" alt="" loading="lazy">` : ''}</div>`;
        s += `<span class="card-name">${esc(card.name)}</span>`;
        s += `<span class="card-mana">${mana}</span>`;
        s += '</div>';
      }
      s += '</div>';
    }

    // Mana curve
    const nonLands = resolved.filter(r => !r.card.type_line.toLowerCase().includes('land'));
    const buckets = {};
    for (const { entry, card } of nonLands) {
      const mv = Math.min(Math.floor(card.cmc), 7);
      buckets[mv] = (buckets[mv] || 0) + entry.quantity;
    }
    const maxBucket = Math.max(...Object.values(buckets), 1);

    s += '<div class="curve-section"><div class="curve-title">Mana Curve</div><div class="curve-chart">';
    for (let mv = 0; mv <= 7; mv++) {
      const count = buckets[mv] || 0;
      const height = count > 0 ? Math.max(4, (count / maxBucket) * 56) : 0;
      s += '<div class="curve-bar-wrap">';
      if (count > 0) s += `<span class="curve-count">${count}</span>`;
      s += `<div class="curve-bar" style="height:${height}px"></div>`;
      s += `<span class="curve-label">${mv === 7 ? '7+' : mv}</span>`;
      s += '</div>';
    }
    s += '</div></div>';

    return s;
  }

  html += renderSection(main, 'Mainboard');
  if (side.length > 0) {
    html += '<div class="section-divider"></div>';
    html += renderSection(side, 'Sideboard');
  }

  container.innerHTML = html;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ─── Hover popup ───
const popup = document.getElementById('card-popup');
const popupImg = document.getElementById('popup-img');
const popupName = document.getElementById('popup-name');
const popupPrice = document.getElementById('popup-price');
const popupType = document.getElementById('popup-type');
const popupText = document.getElementById('popup-text');

function showPopup(event, cardKey) {
  const card = cardCache[cardKey];
  if (!card) return;

  const img = getImageUri(card, 'normal');
  if (img) popupImg.src = img;
  popupName.textContent = card.name;
  popupPrice.textContent = card.prices && card.prices.usd ? '$' + card.prices.usd : '';
  popupType.textContent = card.type_line;
  popupText.textContent = card.oracle_text || '';

  const rect = event.currentTarget.getBoundingClientRect();
  const vpw = window.innerWidth;
  const cardW = 250 + 16;
  const side = rect.left > vpw / 2 ? 'left' : 'right';
  const x = side === 'right' ? rect.right + 12 : rect.left - cardW;
  const y = Math.max(8, Math.min(rect.top - 40, window.innerHeight - 420));

  popup.style.left = x + 'px';
  popup.style.top = y + 'px';
  popup.classList.add('visible');
}

function hidePopup() {
  popup.classList.remove('visible');
}

// ─── UI flow ───
const deckInput = document.getElementById('deck-input');
const submitBtn = document.getElementById('submit-btn');

deckInput.addEventListener('input', () => {
  submitBtn.disabled = !deckInput.value.trim();
});

deckInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) handleSubmit();
});

// Drag and drop
const dropzone = document.getElementById('dropzone');
dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('drag-over'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
dropzone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropzone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) {
    showError('Image parsing coming soon. Paste a text decklist for now.');
  }
});

function handleFile(e) {
  const file = e.target.files[0];
  if (file && file.type.startsWith('image/')) {
    showError('Image parsing coming soon. Paste a text decklist for now.');
  }
}

function loadSample() {
  deckInput.value = SAMPLE_DECK;
  submitBtn.disabled = false;
}

function showError(msg) {
  const el = document.getElementById('error-section');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 5000);
}

function showInput() {
  document.getElementById('input-section').style.display = '';
  document.getElementById('results-section').style.display = 'none';
}

async function handleSubmit() {
  const text = deckInput.value.trim();
  if (!text) return;

  document.getElementById('input-section').style.display = 'none';
  document.getElementById('error-section').style.display = 'none';
  document.getElementById('loading-section').style.display = '';

  try {
    const deck = parseDeckList(text);
    if (deck.entries.length === 0) {
      showError('No cards found. Check your decklist format.');
      showInput();
      return;
    }

    // Deduplicate card names for fetching
    const unique = [];
    const seen = new Set();
    for (const e of deck.entries) {
      const key = e.name.toLowerCase();
      if (!seen.has(key)) { seen.add(key); unique.push({ name: e.name }); }
    }

    await fetchCards(unique);

    // Check if any cards were found
    const found = deck.entries.some(e => cardCache[e.name.toLowerCase()]);
    if (!found) {
      showError('Could not find any cards on Scryfall. Check spelling.');
      showInput();
      return;
    }

    renderDeck(deck.entries, cardCache, deck.name);
    document.getElementById('loading-section').style.display = 'none';
    document.getElementById('results-section').style.display = '';
  } catch (err) {
    showError(err.message || 'Something went wrong.');
    showInput();
  } finally {
    document.getElementById('loading-section').style.display = 'none';
  }
}

function copyShareLink() {
  // For now, just copy the current URL
  navigator.clipboard.writeText(window.location.href).then(() => {
    const btn = document.querySelector('.share-btn');
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy share link'; }, 2000);
  });
}

// ─── Handle URL hash for shared decks ───
if (window.location.hash.length > 1) {
  try {
    const encoded = window.location.hash.slice(1);
    const decoded = atob(encoded.replace(/-/g, '+').replace(/_/g, '/'));
    deckInput.value = decoded;
    handleSubmit();
  } catch (e) {
    // Invalid hash, ignore
  }
}
</script>
</body>
</html>
